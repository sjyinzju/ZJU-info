# ZJU Info Agent — 信息源配置
# 每个源可独立启用/禁用，配置采集方式和关键词

sources:

  # ═══════════════════════════════════════════════════
  # L0 — 完全公开源（RSS / API / 静态 HTML）
  # ═══════════════════════════════════════════════════
  l0_rss:
    - name: "arXiv CS.AI"
      url: "https://arxiv.org/rss/cs.AI"
      enabled: true
      keywords: ["agent", "LLM", "reinforcement learning", "RAG", "multi-agent"]
      max_items: 15

    - name: "arXiv CS.LG"
      url: "https://arxiv.org/rss/cs.LG"
      enabled: true
      keywords: ["deep learning", "transformer", "optimization", "generative model"]
      max_items: 10

  l0_html:
    - name: "ZJU 官网新闻"
      url: "https://www.zju.edu.cn/news/"
      enabled: true
      keywords: ["竞赛", "奖学金", "出国", "交流", "申请", "创新", "科研"]
      selector: ".news-list li"
      max_items: 10

    - name: "挑战杯官网"
      url: "https://www.tiaozhanbei.net"
      enabled: false
      keywords: ["通知", "报名", "结果", "获奖", "截止"]
      selector: ".news-list li"
      max_items: 10

    - name: "CSC 国家留学基金委"
      url: "https://www.csc.edu.cn/chuguo"
      enabled: false
      keywords: ["申请", "名额", "截止", "公告", "选派"]
      selector: ".list_content li"
      max_items: 10

  # ═══════════════════════════════════════════════════
  # L1 — 动态渲染页面（Playwright）
  # ═══════════════════════════════════════════════════
  l1_playwright:
    - name: "蓝桥杯竞赛"
      url: "https://www.lanqiao.cn/competition/"
      enabled: false
      keywords: ["报名", "截止", "通知", "省赛", "国赛"]
      wait_selector: ".competition-list"
      max_items: 8

  # ═══════════════════════════════════════════════════
  # L2 — 微信公众号（经 RSSHub 桥接）
  # ═══════════════════════════════════════════════════
  l2_wechat:
    - name: "浙江大学官方"
      biz: "M_CHANGE_ME"
      enabled: false
      keywords: ["通知", "公告", "竞赛", "奖学金", "讲座"]
      max_items: 10

  # ═══════════════════════════════════════════════════
  # L3 — 通用登录 / 第三方 API
  # ═══════════════════════════════════════════════════
  l3_api:
    - name: "B站 ZJU 官方频道"
      uid: "385924"
      enabled: false
      keywords: ["讲座", "活动", "竞赛", "招生"]
      max_items: 5

  # ═══════════════════════════════════════════════════
  # L4 — ZJU 统一认证（学在浙大 / 教务系统等）
  # ═══════════════════════════════════════════════════
  l4_zjuam:
    - name: "学在浙大课程通知"
      url: "https://courses.zju.edu.cn/api/v1/activities"
      enabled: false
      keywords: ["作业", "考试", "截止", "通知"]
      max_items: 20

  # ═══════════════════════════════════════════════════
  # L5 — 校园网限制（CC98 等）
  # ═══════════════════════════════════════════════════
  l5_cc98:
    - name: "CC98 热门帖子"
      endpoint: "/topic/hot"
      enabled: false
      keywords: ["竞赛", "奖学金", "出国", "实习", "offer"]
      max_items: 30
