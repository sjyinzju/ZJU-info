# ========================================================================
#  ZJU Info Agent — 用户配置文件（唯一配置入口）
# ========================================================================
#  所有可配置项都在这个文件里。修改后保存，下次运行即可生效。
#  密钥可以写明文，也可以用 ${ENV_VAR} 从 config/.env 注入。
# ========================================================================


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  1. 基本信息                                                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
user:
  name: "用户"                                      # 你的称呼，日报里会用
  identity: "浙江大学 在读本科生"  # 身份描述，注入 LLM 上下文
  interests:                                         # 你的关注方向（影响 LLM 筛选优先级）
    - "AI/ML 前沿研究（Agent、大语言模型）"
    - "高含金量科研竞赛（挑战杯、互联网+、ACM/ICPC、数学建模）"
    - "出国交流 / 联培机会（优先美国、欧洲顶校）"
    - "有竞争力的实习和校招岗位（算法、研究、工程方向）"
    - "实验室科研机会与导师招生信息"
    - "奖学金、评优、保研相关政策"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  2. 大模型配置                                                         ║
# ╚══════════════════════════════════════════════════════════════════════════╝
llm:
  provider: "deepseek"                              # deepseek / openai / anthropic
  model: "deepseek-chat"                            # 模型名称
  # api_key 的两种填写方式（.env 优先）:
  #   方式A: api_key: "${DEEPSEEK_API_KEY}"         → 从 config/.env 读取（推荐，不会误提交）
  #   方式B: api_key: "sk-your-real-key-here"       → 直接写在这里（方便但不安全）
  #   如果 .env 没填而这里用 ${...}，启动时会报错提示你
  api_key: "${DEEPSEEK_API_KEY}"
  base_url: "https://api.deepseek.com"              # API 地址
  max_tokens: 8000                                  # 单次调用最大输出 token（需足够大以容纳筛选结果）
  temperature: 0.3                                  # 创造性控制 (0=保守, 1=自由)


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  3. 输出配置                                                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
output:
  report_dir: "E:/MyReports"                        # 日报存放目录，不存在则自动创建
  report_name_format: "{date}-{seq:02d}"             # 文件名格式: 2026-6-10-01.md
  save_raw: true                                    # 是否保存原始采集数据（调试用）
  save_processed: true                              # 是否保存 LLM 处理后的结构化 JSON


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  4. 定时运行                                                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
schedule:
  enabled: false                                    # 是否启用定时（开发阶段建议 false）
  times: ["08:00"]                                  # 每天几点运行（北京时间）
  timezone: "Asia/Shanghai"
  collection_interval_minutes: 120                  # 采集间隔（定时以外如需独立刷新）


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  5. 采集行为                                                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
crawl:
  max_concurrent: 5                                 # 最大同时抓取数
  request_delay_seconds: [1, 3]                     # 请求间隔随机范围（秒）
  timeout_seconds: 30                               # 单次请求超时
  max_retries: 3                                    # 失败重试次数
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  6. 通知推送（按需启用）                                               ║
# ╚══════════════════════════════════════════════════════════════════════════╝
notify:
  feishu:
    enabled: false
    webhook_url: "${FEISHU_WEBHOOK}"
  email:
    enabled: false
    smtp_host: "smtp.zju.edu.cn"
    smtp_port: 465
    from_addr: "${EMAIL_FROM}"
    to_addr: "${EMAIL_TO}"
    password: "${EMAIL_PASSWORD}"


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  7. 认证信息                                                           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
auth:
  zjuam:
    username: "${ZJU_USERNAME}"                     # 学号
    password: "${ZJU_PASSWORD}"                     # 密码
  cc98:
    token: "${CC98_TOKEN}"                          # C98 Bearer Token（手动提取，备用）
    token_out_of_campus: "${CC98_TOKEN_OUT_OF_CAMPUS_NETWORK}"  # 校外 VPN 环境 Token（备用）
    username: "${CC98_USERNAME}"                    # CC98 用户名（非学号！如 sjy_in_zju）
    password: "${CC98_PASSWORD}"                    # CC98 本地密码（自动获取 Token，推荐）


# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  8. 信息源（分门别类，可自由增减）                                     ║
